<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Calculator</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #1e1e2f;
    font-family: Arial, sans-serif;
  }
  .calculator {
    background: #2d2d44;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  #display {
    width: 100%;
    height: 60px;
    font-size: 24px;
    text-align: right;
    margin-bottom: 15px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #111;
    color: #0f0;
  }
  .buttons {
    display: grid;
    grid-template-columns: repeat(5, 60px);
    gap: 10px;
  }
  button {
    height: 50px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    background: #444;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #666; }
  .operator { background: #ff9500; }
  .scientific { background: #5856d6; }
  .equals { background: #34c759; grid-column: span 2; }
  .clear { background: #ff3b30; }
</style>
</head>
<body>
<div class="calculator">
  <input type="text" id="display" readonly>
  <div class="buttons">
    <button class="scientific" onclick="insert('Math.sin(')">sin</button>
    <button class="scientific" onclick="insert('Math.cos(')">cos</button>
    <button class="scientific" onclick="insert('Math.tan(')">tan</button>
    <button class="scientific" onclick="insert('Math.log10(')">log</button>
    <button class="scientific" onclick="insert('Math.log(')">ln</button>
    
    <button class="scientific" onclick="insert('Math.sqrt(')">√</button>
    <button class="scientific" onclick="insert('Math.pow(')">x^y</button>
    <button class="scientific" onclick="insert('Math.PI')">π</button>
    <button class="scientific" onclick="insert('Math.E')">e</button>
    <button class="scientific" onclick="insert('(')">(</button>
    
    <button onclick="insert('7')">7</button>
    <button onclick="insert('8')">8</button>
    <button onclick="insert('9')">9</button>
    <button class="operator" onclick="insert('/')">÷</button>
    <button onclick="insert(')')">)</button>
    
    <button onclick="insert('4')">4</button>
    <button onclick="insert('5')">5</button>
    <button onclick="insert('6')">6</button>
    <button class="operator" onclick="insert('*')">×</button>
    <button class="clear" onclick="clearDisplay()">C</button>
    
    <button onclick="insert('1')">1</button>
    <button onclick="insert('2')">2</button>
    <button onclick="insert('3')">3</button>
    <button class="operator" onclick="insert('-')">-</button>
    <button onclick="deleteLast()">DEL</button>
    
    <button onclick="insert('0')">0</button>
    <button onclick="insert('.')">.</button>
    <button class="operator" onclick="insert('+')">+</button>
    <button class="equals" onclick="calculate()">=</button>
  </div>
</div>

<script>
  let display = document.getElementById('display');
  
  function insert(value) {
    display.value += value;
  }
  
  function clearDisplay() {
    display.value = '';
  }
  
  function deleteLast() {
    display.value = display.value.slice(0, -1);
  }
  
  function calculate() {
    try {
      display.value = eval(display.value);
    } catch (error) {
      display.value = 'Error';
    }
  }
  
  // Allow keyboard input
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') calculate();
    if (e.key === 'Backspace') deleteLast();
  });
</script>
</body>
</html>
